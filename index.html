<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JESSIE | AI Visual & Art Direction</title>
    <style>
        /* 引入奢华品牌常用的 Google 字体 */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap');

        /* 基础重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            font-family: 'Jost', sans-serif; 
            background-color: #FDFBF9; /* 珍珠白底色 */
            color: #2C2B29; /* 优雅的深炭灰色 */
            overflow: hidden; /* 锁定整屏，不允许页面上下滚动，实现全屏沉浸感 */
        }

        /* --- 全屏视频背景与奶油色蒙版 --- */
        .video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
        }
        .video-container video {
            width: 100%; height: 100%;
            object-fit: cover; /* 保证视频铺满全屏不变形 */
        }
        .overlay-mask {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 燕麦奶油色渐变蒙版，透明度设置为0.88，既透出视频动态，又保证文字清晰 */
            background: linear-gradient(to bottom, rgba(253, 251, 249, 0.95) 0%, rgba(244, 241, 234, 0.85) 100%);
            z-index: -1;
            backdrop-filter: blur(8px); /* 微微的毛玻璃效果，增加高级感 */
        }

        /* --- 顶部导航 (胶囊形状) --- */
        .top-bar {
            position: absolute;
            top: 40px; width: 100%;
            display: flex; justify-content: center;
            z-index: 10;
        }
        .nav-pill {
            background-color: rgba(255, 255, 255, 0.6);
            border: 1px solid #EBE7E0;
            padding: 8px 24px;
            border-radius: 50px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            backdrop-filter: blur(10px);
        }
        .nav-pill .status-dot {
            width: 8px; height: 8px; background-color: #8B9D83; /* 优雅的灰绿色圆点 */
            border-radius: 50%;
        }
        .nav-pill span {
            font-size: 13px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500;
        }

        /* --- 居中个人介绍区域 --- */
        .center-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -60%); /* 稍微偏上一点，给底部留空间 */
            width: 90%; max-width: 900px;
            text-align: center;
            z-index: 10;
        }
        .greeting {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem; font-style: italic; font-weight: 400;
            margin-bottom: 40px; letter-spacing: 2px;
        }
        
        /* 履历排版：三列并排展示，更加紧凑高级 */
        .intro-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            text-align: left;
        }
        .intro-block h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem; margin-bottom: 15px; font-weight: 600; 
            letter-spacing: 2px; text-transform: uppercase;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 10px;
        }
        .intro-block p {
            font-size: 14px; line-height: 1.8; color: #555; text-align: justify;
        }

        /* --- 底部画廊缩略图 (参考图1) --- */
        .bottom-gallery {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 1200px;
            display: flex; justify-content: center; gap: 15px;
            z-index: 10;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        /* 隐藏滚动条但保留滚动功能 */
        .bottom-gallery::-webkit-scrollbar { display: none; } 
        
        .gallery-item {
            width: 100px; height: 100px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            border: 2px solid transparent;
        }
        .gallery-item img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.4s ease;
        }
        .gallery-item:hover {
            transform: translateY(-8px);
            border: 2px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* --- 移动端适配 --- */
        @media (max-width: 900px) {
            .intro-grid { grid-template-columns: 1fr; gap: 20px; }
            .center-content { transform: translate(-50%, -50%); top: 45%; max-height: 60vh; overflow
